<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-title>Eksplor Skill</ion-title>
  </ion-toolbar>
  <ion-toolbar color="primary" class="search-toolbar">
    <ion-searchbar
      placeholder="Cari Skill atau Nama..."
      (ionInput)="onSearchChange($event)"
      debounce="500"
      show-clear-button="always"
      class="custom-searchbar"
    >
    </ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding-top">
  <div *ngIf="(searchTerm$ | async) as term">
    <div *ngIf="term.length >= 2">
      <ion-list-header>
        <ion-label class="main-label">Hasil Pencarian untuk "{{ term }}"</ion-label>
      </ion-list-header>
      
      <ion-card
        class="user-card"
        *ngFor="let user of searchResult$ | async"
        (click)="goToDetail(user)"
      >
        <ion-item lines="none">
            <ion-avatar slot="start" class="large-avatar">
              <img [src]="'https://ui-avatars.com/api/?color=fff&name=' + user.fullName" />
            </ion-avatar>
          <ion-label>
            <h2>{{ user.fullName }}</h2>
            <div class="skill-tags">
              <span *ngFor="let skill of user.skillsOffered.slice(0,3)" class="badge-skill">
                {{ skill }}
              </span>
            </div>
          </ion-label>
          <ion-icon name="chevron-forward-outline" slot="end" color="medium"></ion-icon>
        </ion-item>
      </ion-card>
    </div>
  </div>

  <div *ngIf="!(searchTerm$ | async)">
    
    <div *ngIf="recentUsers.length > 0" class="history-section">
      <ion-list-header>
        <ion-label class="main-label">Terakhir Dilihat</ion-label>
        <ion-button fill="clear" size="small" color="danger" (click)="clearHistory()" class="btn-clear">
          Hapus
        </ion-button>
      </ion-list-header>
      
      <div class="horizontal-scroll-container">
        <div class="history-item" *ngFor="let user of recentUsers" (click)="goToDetail(user)">
          <div class="avatar-wrapper">
            <img [src]="'https://ui-avatars.com/api/?background=random&name=' + user.fullName" />
          </div>
          <p>{{ user.fullName.split(' ')[0] }}</p>
        </div>
      </div>
    </div>

    <ion-list-header class="ion-margin-top">
      <ion-label class="main-label">Rekomendasi Partner</ion-label>
    </ion-list-header>
    
    <ion-card
      class="user-card recommend-card"
      *ngFor="let user of recommendedUsers$ | async"
      (click)="goToDetail(user)"
    >
      <ion-item lines="none">
          <ion-avatar slot="start" class="large-avatar">
            <img [src]="'https://ui-avatars.com/api/?color=fff&name=' + user.fullName" />
          </ion-avatar>
        <ion-label>
          <h2>{{ user.fullName }}</h2>
          <p class="skills-preview">
            <ion-icon name="book-outline"></ion-icon>
            {{ user.skillsOffered.slice(0,2).join(', ') }}...
          </p>
        </ion-label>
        <ion-button fill="solid" size="small" color="primary" class="btn-view" slot="end">
          Lihat
        </ion-button>
      </ion-item>
    </ion-card>
  </div>
</ion-content>
