<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-title>Profil Saya</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="logout()" color="light">
        <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ng-container *ngIf="user$ | async as user; else loading">
    
    <div class="ion-text-center ion-padding-vertical">
      <ion-avatar style="width: 110px; height: 110px; margin: 0 auto; border: 3px solid var(--ion-color-primary); padding: 3px;">
        <img [src]="'https://ui-avatars.com/api/?background=random&name=' + user.fullName + '&size=200'" />
      </ion-avatar>
      
      <h2 style="font-weight: 800; margin-top: 15px; margin-bottom: 5px;">{{ user.fullName }}</h2>
      
      <p style="color: #666; font-style: italic; font-size: 0.95rem; margin: 0 20px 15px 20px;">
        "{{ user.bio || 'Belum ada bio. Tambahkan bio agar partner barter mengenalmu!' }}"
      </p>

      <ion-button (click)="editProfile(user)" fill="outline" shape="round" size="small">
        <ion-icon name="create-outline" slot="start"></ion-icon>
        Edit ProfilSS
      </ion-button>
    </div>

    <div style="height: 1px; background: #e0e0e0; margin: 20px 0;"></div>

    <ion-card class="ion-no-margin" style="border-radius: 15px; box-shadow: none; border: 1px solid #eee;">
      <ion-card-header>
        <ion-card-title style="font-size: 1rem; font-weight: bold;">Skill yang Saya Tawarkan</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <div style="display: flex; flex-wrap: wrap; gap: 8px;">
          <ion-chip color="primary" mode="ios" *ngFor="let skill of user.skillsOffered">
            <ion-icon name="ribbon-outline"></ion-icon>
            <ion-label style="font-weight: 600;">{{ skill }}</ion-label>
          </ion-chip>
          
          <p *ngIf="!user.skillsOffered || user.skillsOffered.length === 0" style="color: gray;">
            Belum ada skill yang ditambahkan.
          </p>
        </div>
      </ion-card-content>
    </ion-card>

  </ng-container>

  <ng-template #loading>
    <div class="ion-text-center" style="margin-top: 50px;">
      <ion-spinner name="crescent" color="primary"></ion-spinner>
      <p>Memuat profil...</p>
    </div>
  </ng-template>
</ion-content>
