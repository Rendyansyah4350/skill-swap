<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-title>Profil Saya</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ng-container *ngIf="user$ | async as userData; else loading">
    <div class="profile-header ion-text-center ion-padding">
      <ion-avatar class="main-avatar" style="width: 100px; height: 100px; margin: 0 auto; border: 3px solid var(--ion-color-primary);">
        <img [src]="'https://ui-avatars.com/api/?name=' + userData.fullName + '&size=128&background=random'" />
      </ion-avatar>
      <h2 style="font-weight: 800; margin-top: 15px; font-size: 1.5rem;">{{ userData.fullName }}</h2>
      <p style="color: var(--ion-color-step-600);">{{ userData.email }}</p>
    </div>

    <ion-list-header style="margin-top: 10px;">
      <ion-label style="font-weight: bold; font-size: 1.1rem;">Skill yang dimiliki: </ion-label>
    </ion-list-header>
    
    <div class="ion-padding-start ion-padding-end" style="display: flex; flex-wrap: wrap; gap: 5px;">
      <ion-chip color="primary" mode="ios" *ngFor="let skill of userData.skillsOffered">
        <ion-label>{{ skill }}</ion-label>
      </ion-chip>
      
      <div *ngIf="!userData.skillsOffered?.length" class="ion-padding-vertical">
        <ion-note color="medium">Belum ada skill yang ditambahkan.</ion-note>
      </div>
    </div>

    <ion-list class="ion-margin-top" lines="full">
      <ion-item button detail="true" (click)="editProfile(userData)">
        <ion-icon name="create-outline" slot="start" color="primary"></ion-icon>
        <ion-label>Edit Profile & Skill</ion-label>
      </ion-item>
      
      <ion-item button detail="false" (click)="logout()" color="danger">
        <ion-icon name="log-out-outline" slot="start"></ion-icon>
        <ion-label style="font-weight: 500;">Keluar Aplikasi</ion-label>
      </ion-item>
    </ion-list>
  </ng-container>

  <ng-template #loading>
    <div class="ion-text-center ion-padding">
      <ion-spinner name="crescent"></ion-spinner>
      <p>Memuat profil...</p>
    </div>
  </ng-template>
</ion-content>
