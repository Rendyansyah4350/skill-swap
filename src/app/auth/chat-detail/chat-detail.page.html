<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/home"></ion-back-button>
    </ion-buttons>
    <ion-title (click)="goToPartnerProfile()">{{ partnerName }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div *ngIf="messages$ | async as msgs; else noMsgs">
    <div *ngFor="let msg of msgs" 
         [class]="msg.senderId === currentUserId ? 'message-wrapper sent' : 'message-wrapper received'">
      <div class="message-bubble">
        {{ msg.text }}
      </div>
    </div>
  </div>

  <ng-template #noMsgs>
    <div class="ion-text-center ion-padding">
      <ion-note>Belum ada pesan. Mulai obrolan yuk!</ion-note>
    </div>
  </ng-template>
</ion-content>

<ion-footer>
  <ion-toolbar color="light">
    <ion-item lines="none" color="light">
      <ion-input [(ngModel)]="newMessage" placeholder="Ketik pesan..." (keyup.enter)="sendMessage()"></ion-input>
      <ion-button slot="end" fill="clear" (click)="sendMessage()" [disabled]="!newMessage.trim()">
        <ion-icon name="send" color="primary"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-toolbar>
</ion-footer>
