<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/home" color="light"></ion-back-button>
    </ion-buttons>
    
    <div (click)="goToPartnerProfile()" style="display: flex; align-items: center; gap: 10px; cursor: pointer">
        <ion-avatar style="width: 32px; height: 32px;">
          <img [src]="'https://ui-avatars.com/api/?' + (isPartnerActive ? '' : 'background=cccccc&') + 'color=fff&name=' + partnerName" />
        </ion-avatar>
      <ion-title style="padding: 0; font-weight: 700; font-size: 1.1rem; color: white;">
        {{ partnerName }}
      </ion-title>
    </div>

    <ion-buttons slot="end">
      <ion-button (click)="presentActionSheet()">
        <ion-icon name="ellipsis-vertical" slot="icon-only" color="light"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding chat-content">
  <div *ngIf="messages$ | async as msgs; else noMsgs">
    <div
      *ngFor="let msg of msgs"
      [class]="msg.senderId === currentUserId ? 'message-wrapper sent' : 'message-wrapper received'"
    >
      <div class="message-bubble" (click)="presentDeleteOptions(msg)">
        <div class="message-text">{{ msg.text }}</div>

        <div class="message-info">
          <span class="time">
            {{ msg.timestamp?.toDate() | date:'HH:mm' }}
          </span>

          <ion-icon
            *ngIf="msg.senderId === currentUserId"
            [name]="msg.isRead ? 'checkmark-done' : 'checkmark-outline'"
            [color]="msg.isRead ? 'secondary' : 'medium'"
          >
          </ion-icon>
        </div>
      </div>
    </div>
  </div>

  <ng-template #noMsgs>
    <div class="ion-text-center ion-padding" style="margin-top: 50px">
      <ion-note>Belum ada pesan. Mulai obrolan yuk!</ion-note>
    </div>
  </ng-template>
</ion-content>

<ion-footer class="ion-no-border">
  <ion-toolbar color="light">
    <ion-item lines="none" color="light" *ngIf="isPartnerActive; else accountDeleted">
      <ion-input
        [(ngModel)]="newMessage"
        placeholder="Ketik pesan..."
        (keyup.enter)="sendMessage()"
        class="custom-input"
      >
      </ion-input>
      <ion-button
        slot="end"
        fill="clear"
        (click)="sendMessage()"
        [disabled]="!newMessage || !newMessage.trim()"
      >
        <ion-icon name="send" color="primary"></ion-icon>
      </ion-button>
    </ion-item>

    <ng-template #accountDeleted>
      <div class="ion-text-center ion-padding" style="width: 100%;">
        <ion-text color="danger">
          <p style="font-weight: 600; font-size: 0.9rem; margin: 0;">
            <ion-icon name="alert-circle-outline"></ion-icon>
            Akun partner sudah tidak aktif.
          </p>
        </ion-text>
      </div>
    </ng-template>
  </ion-toolbar>
</ion-footer>
