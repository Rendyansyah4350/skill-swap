<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Login Skill-Swap</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="auth-container">
    <ion-card class="auth-card">
      <div class="ion-text-center ion-padding-top">
        <div class="logo-wrapper">
          <img
            alt="SkillSwap Logo"
            src="assets/icon/favicon.png"
            style="width: 80px; height: auto;"
          />
        </div>
        <ion-card-header>
          <ion-card-title>SkillSwap</ion-card-title>
          <ion-card-subtitle>Masuk ke akun Anda</ion-card-subtitle>
        </ion-card-header>
      </div>

      <ion-card-content>
        <ion-list lines="inset">
          <ion-item class="ion-margin-bottom">
            <ion-icon name="mail-outline" slot="start"></ion-icon>
            <ion-label position="floating">Email</ion-label>
            <ion-input type="email" [(ngModel)]="loginData.email"></ion-input>
          </ion-item>

          <ion-item class="ion-margin-bottom">
            <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
            <ion-label position="floating">Password</ion-label>
            <ion-input
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="loginData.password"
            ></ion-input>
            <ion-button slot="end" fill="clear" (click)="togglePassword()">
              <ion-icon
                [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"
              ></ion-icon>
            </ion-button>
          </ion-item>
        </ion-list>

        <ion-button
          expand="block"
          shape="round"
          class="ion-margin-top"
          (click)="login()"
        >
          Masuk
        </ion-button>

        <div class="ion-text-center ion-margin-top">
          <ion-note (click)="goToRegister()" style="cursor: pointer;">
            Belum punya akun? <ion-text color="primary"><b>Daftar di sini</b></ion-text>
          </ion-note>
        </div>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
